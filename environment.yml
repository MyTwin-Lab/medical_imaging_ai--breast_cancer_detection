name: mamography
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - conda-forge::pydicom>=2.4
  - conda-forge::scikit-learn>=1.4
  - conda-forge::albumentations>=1.4
  - conda-forge::opencv>=4.9
  - conda-forge::matplotlib>=3.8
  - conda-forge::numpy>=1.26
  - conda-forge::tqdm>=4.66
  - pip
  - pip:
    - kaggle
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch>=2.7
    - torchvision>=0.22
